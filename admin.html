<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administración — Granger S.A.</title>
<style>
  :root {
    --black: #1A1A1A; --gray-50: #F8F8F8; --gray-100: #EEEEEE;
    --gray-200: #DDDDDD; --gray-400: #999999; --gray-600: #666666;
    --gray-800: #222222; --red: #C0392B; --red-light: #FDECEA;
    --white: #FFFFFF; --radius: 8px;
    --shadow: 0 1px 4px rgba(0,0,0,0.08);
    --shadow-lg: 0 4px 16px rgba(0,0,0,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--gray-50); color: var(--gray-800); min-height: 100vh; }
  .app-header { background: #fff; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; border-bottom: 1.5px solid var(--gray-200); box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .app-header .logo { display: flex; align-items: center; gap: 14px; }
  .app-header .logo img { height: 38px; }
  .app-header .logo-divider { width: 1px; height: 28px; background: var(--gray-200); }
  .app-header .logo-subtitle { font-size: 13px; font-weight: 500; color: var(--gray-400); }
  .back-link { font-size: 12px; color: var(--gray-400); text-decoration: none; display: flex; align-items: center; gap: 4px; transition: color 0.2s; }
  .back-link:hover { color: var(--black); }
  .app-body { max-width: 960px; margin: 0 auto; padding: 28px 20px 60px; }
  .card { background: white; border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px; margin-bottom: 20px; }
  .card-title { font-size: 15px; font-weight: 700; color: var(--black); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .card-title .icon { width: 28px; height: 28px; background: var(--black); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 24px; background: var(--gray-100); border-radius: var(--radius); padding: 4px; }
  .tab-btn { flex: 1; padding: 8px 12px; border: none; background: none; border-radius: 6px; font-size: 13px; font-weight: 600; color: var(--gray-600); cursor: pointer; transition: all 0.2s; }
  .tab-btn.active { background: white; color: var(--black); box-shadow: var(--shadow); border-bottom: 2px solid var(--black); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 12px; font-weight: 600; color: var(--gray-600); text-transform: uppercase; letter-spacing: 0.4px; }
  input, select, textarea { padding: 9px 12px; border: 1.5px solid var(--gray-200); border-radius: 6px; font-size: 14px; color: var(--gray-800); background: white; transition: border-color 0.2s, box-shadow 0.2s; outline: none; font-family: inherit; }
  input:focus, select:focus, textarea:focus { border-color: #888; box-shadow: 0 0 0 3px rgba(0,0,0,0.08); }
  textarea { resize: vertical; min-height: 72px; }
  .btn { padding: 9px 20px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.18s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--black); color: white; }
  .btn-primary:hover { background: #000; }
  .btn-ghost { background: none; border: 1.5px solid var(--gray-200); color: var(--gray-600); }
  .btn-ghost:hover { border-color: var(--black); color: var(--black); }
  .btn-sm { padding: 6px 14px; font-size: 12px; }
  .btn-accent { background: var(--black); color: white; }
  .btn-accent:hover { background: #000; }
  .btn-approve { background: var(--black); color: white; border: none; }
  .btn-approve:hover { background: #000; }
  .gasto-row { display: grid; grid-template-columns: 90px 1fr 90px 100px 100px 80px 32px; gap: 8px; padding: 10px 12px; border-radius: 6px; margin-bottom: 4px; background: var(--gray-50); border: 1.5px solid transparent; align-items: center; font-size: 13px; }
  .gasto-row:hover { background: white; border-color: var(--gray-200); }
  .gasto-header { display: grid; grid-template-columns: 90px 1fr 90px 100px 100px 80px 32px; gap: 8px; padding: 6px 12px; font-size: 11px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.5px; }
  .remove-btn { background: none; border: none; color: var(--gray-400); cursor: pointer; font-size: 16px; padding: 2px 4px; border-radius: 4px; }
  .remove-btn:hover { color: var(--red); background: var(--red-light); }
  .total-row { display: flex; justify-content: flex-end; gap: 16px; align-items: center; padding: 12px 12px 0; border-top: 1.5px solid var(--gray-100); margin-top: 8px; }
  .total-label { color: var(--gray-600); font-weight: 600; font-size: 14px; }
  .total-amount { font-size: 18px; font-weight: 800; color: var(--black); }
  .upload-zone { border: 2px dashed var(--gray-200); border-radius: var(--radius); padding: 20px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--gray-50); }
  .upload-zone:hover, .upload-zone.dragover { border-color: var(--black); background: #F0F0F0; }
  .upload-zone .upload-icon { font-size: 28px; margin-bottom: 6px; }
  .upload-zone p { font-size: 13px; color: var(--gray-600); }
  .file-preview { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--gray-50); border-radius: 6px; border: 1.5px solid var(--gray-200); margin-top: 10px; }
  .file-name { font-size: 13px; font-weight: 600; color: var(--black); flex: 1; }
  .file-size { font-size: 12px; color: var(--gray-400); }
  .remove-file { background: none; border: none; color: var(--gray-400); cursor: pointer; font-size: 16px; }
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; }
  .badge-pending { background: var(--gray-100); color: #444; border: 1px solid var(--gray-200); }
  .badge-approved { background: #E8E8E8; color: var(--black); border: 1px solid #BBB; }
  .badge-consulta { background: #FFF3DC; color: #7A5000; border: 1px solid #F0D08C; }
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
  .stat-card { background: white; border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px 18px; }
  .stat-card .stat-label { font-size: 11px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
  .stat-card .stat-value { font-size: 24px; font-weight: 800; color: var(--black); }
  .stat-card .stat-sub { font-size: 12px; color: var(--gray-400); margin-top: 2px; }
  .rendicion-card { background: white; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 14px; overflow: hidden; transition: box-shadow 0.2s; }
  .rendicion-card:hover { box-shadow: var(--shadow-lg); }
  .rendicion-card-header { padding: 16px 20px; display: flex; align-items: center; gap: 14px; cursor: pointer; border-bottom: 1.5px solid transparent; }
  .rendicion-card-header:hover, .rendicion-card-header.expanded { border-bottom-color: var(--gray-100); }
  .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--black); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; color: white; flex-shrink: 0; }
  .rendicion-info { flex: 1; }
  .rendicion-info .name { font-size: 14px; font-weight: 700; color: var(--black); }
  .rendicion-info .meta { font-size: 12px; color: var(--gray-400); margin-top: 2px; }
  .rendicion-total { font-size: 18px; font-weight: 800; color: var(--black); margin-right: 12px; text-align: right; }
  .expand-icon { color: var(--gray-400); transition: transform 0.2s; font-size: 18px; }
  .expand-icon.open { transform: rotate(180deg); }
  .rendicion-body { padding: 20px; display: none; }
  .rendicion-body.open { display: block; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .detail-item { background: var(--gray-50); padding: 10px 14px; border-radius: 6px; }
  .detail-item .d-label { font-size: 11px; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 3px; }
  .detail-item .d-value { font-size: 13px; font-weight: 600; color: var(--gray-800); }
  .mini-gastos { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 16px; }
  .mini-gastos th { text-align: left; padding: 6px 10px; font-size: 11px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.4px; border-bottom: 1.5px solid var(--gray-100); }
  .mini-gastos td { padding: 8px 10px; border-bottom: 1px solid var(--gray-100); }
  .mini-gastos tr:last-child td { border-bottom: none; }
  .mini-gastos .td-amount { font-weight: 700; text-align: right; }
  .action-bar { display: flex; gap: 10px; align-items: center; padding-top: 14px; border-top: 1.5px solid var(--gray-100); }
  .alert { padding: 12px 16px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; display: flex; align-items: flex-start; gap: 10px; border-left: 3px solid var(--gray-400); background: var(--gray-50); }
  .empty-state { text-align: center; padding: 48px 20px; color: var(--gray-400); }
  .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 12px; padding: 28px; width: 480px; max-width: 95vw; box-shadow: var(--shadow-lg); }
  .modal h3 { font-size: 17px; font-weight: 800; color: var(--black); margin-bottom: 8px; }
  .modal p { font-size: 13px; color: var(--gray-600); margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
  .toast { background: var(--black); color: white; padding: 12px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; box-shadow: var(--shadow-lg); animation: slideIn 0.3s ease; }
  .toast.error { background: var(--red); }
  @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .type-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-left: 6px; }
  .type-tarjeta { background: #1A1A1A; color: white; }
  .type-viaticos { background: #444; color: white; }
  @media (max-width: 640px) { .form-grid, .form-grid.cols-3 { grid-template-columns: 1fr; } .stats-row { grid-template-columns: 1fr 1fr; } .detail-grid { grid-template-columns: 1fr; } }
</style>
</head>

AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA//2Q==" alt="Granger">
    <div class="logo-divider"></div>
    <span class="logo-subtitle">Administración</span>
  </div>
</header>

<div class="app-body">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px">
    <h2 style="font-size:20px;font-weight:800;color:var(--black)">Panel de Administración</h2>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <select id="filtroTipo" onchange="renderAdmin()" style="padding:7px 12px;border:1.5px solid var(--gray-200);border-radius:6px;font-size:13px;background:white">
        <option value="">💳 + 🧳 Todos</option>
        <option value="tarjeta">💳 Tarjeta corporativa</option>
        <option value="viaticos">🧳 Viáticos</option>
      </select>
      <select id="filtroEstado" onchange="renderAdmin()" style="padding:7px 12px;border:1.5px solid var(--gray-200);border-radius:6px;font-size:13px;background:white">
        <option value="">Todos los estados</option>
        <option value="pendiente">Pendientes</option>
        <option value="aprobado">Aprobados</option>
        <option value="con consulta">Con consulta</option>
      </select>
      <select id="filtroTitular" onchange="renderAdmin()" style="padding:7px 12px;border:1.5px solid var(--gray-200);border-radius:6px;font-size:13px;background:white">
        <option value="">Todos los titulares</option>
        <option>Pablo Andr Rucci</option><option>Jonatan Claudi Rose</option><option>Carolina Anabel Roa</option>
        <option>Rodrigo Yoel Sabena</option><option>Tomas Alej Giuliani</option><option>Maria Cecilia Ullua</option>
        <option>Matias Navarro</option><option>Jose I. Lobos</option>
      </select>
    </div>
  </div>

  <div class="stats-row" id="statsRow"></div>
  <div id="adminList"></div>
  <div id="adminEmpty" class="empty-state" style="display:none"><div class="empty-icon">📭</div><p>No hay rendiciones que coincidan con el filtro.</p></div>
</div>

<div class="modal-overlay" id="modalConsulta">
  <div class="modal">
    <h3>Enviar consulta</h3>
    <p>El titular verá tu consulta y podrá responder desde su historial.</p>
    <div class="form-group" style="margin-bottom:16px">
      <label>Mensaje</label>
      <textarea id="consultaTexto" placeholder="Indicá qué necesitás que justifiquen..." style="min-height:90px"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmarConsulta()">Enviar consulta</button>
    </div>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>

<script>

const STORAGE_KEY = 'granger_rendiciones_v2';
let rendiciones = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
function saveRendiciones() { localStorage.setItem(STORAGE_KEY, JSON.stringify(rendiciones)); }
function reloadRendiciones() { rendiciones = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
function fmt(n) { return Number(n).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function formatDate(str) { if(!str)return''; const[y,m,d]=str.split('-'); return `${d}/${m}/${y}`; }
function formatDatetime(iso) { const d=new Date(iso); return d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}); }
function formatFileSize(b) { if(b<1024)return b+' B'; if(b<1048576)return(b/1024).toFixed(1)+' KB'; return(b/1048576).toFixed(1)+' MB'; }
function badgeHTML(estado) {
  const map={'pendiente':['badge-pending','● Pendiente'],'aprobado':['badge-approved','● Aprobado'],'con consulta':['badge-consulta','● Con consulta']};
  const[cls,label]=map[estado]||['badge-pending',estado]; return `<span class="badge ${cls}">${label}</span>`;
}
function showToast(msg,type){ const c=document.getElementById('toastContainer'); const t=document.createElement('div'); t.className='toast '+(type||''); t.textContent=msg; c.appendChild(t); setTimeout(()=>t.remove(),3200); }
function openBlob(rendicionId) {
  const r=rendiciones.find(x=>String(x.id)===String(rendicionId));
  if(!r||!r.adjunto||!r.adjunto.data){showToast('No hay archivo disponible','error');return;}
  try { const by=atob(r.adjunto.data.split(',')[1]); const ab=new ArrayBuffer(by.length); const ia=new Uint8Array(ab); for(let i=0;i<by.length;i++)ia[i]=by.charCodeAt(i); const blob=new Blob([ab],{type:r.adjunto.type}); const url=URL.createObjectURL(blob); window.open(url,'_blank'); setTimeout(()=>URL.revokeObjectURL(url),10000); } catch(e){showToast('Error','error');}
}
function adjuntoHTML(r) {
  if(!r.adjunto) return '<span style="color:var(--gray-400)">Sin adjunto</span>';
  if(!r.adjunto.data) return `📎 ${r.adjunto.name}`;
  return `<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <span style="font-weight:600">📎 ${r.adjunto.name}</span>
    <span style="font-size:11px;color:var(--gray-400)">${formatFileSize(r.adjunto.size)}</span>
    <a href="${r.adjunto.data}" download="${r.adjunto.name}" style="font-size:12px;font-weight:600;text-decoration:underline;color:var(--black)">⬇ Descargar</a>
    ${r.adjunto.type==='application/pdf'?`<button onclick="openBlob('${r.id}')" style="font-size:12px;background:none;border:none;cursor:pointer;font-weight:600;text-decoration:underline;padding:0">🔍 Ver PDF</button>`:''}
    ${r.adjunto.type&&r.adjunto.type.startsWith('image/')?`<br><img src="${r.adjunto.data}" style="max-width:100%;max-height:220px;border-radius:6px;margin-top:8px;border:1px solid var(--gray-200)"/>`:''}
  </div>`;
}

let expandedId=null, consultaTargetId=null;

function renderAdmin(){
  reloadRendiciones();
  const filtroE=document.getElementById('filtroEstado').value;
  const filtroT=document.getElementById('filtroTitular').value;
  const filtroTipo=document.getElementById('filtroTipo').value;
  let filtradas=rendiciones;
  if(filtroTipo) filtradas=filtradas.filter(r=>r.tipo===filtroTipo);
  if(filtroE) filtradas=filtradas.filter(r=>r.estado===filtroE);
  if(filtroT) filtradas=filtradas.filter(r=>r.titular===filtroT);

  const total=rendiciones.length, pend=rendiciones.filter(r=>r.estado==='pendiente').length,
    apro=rendiciones.filter(r=>r.estado==='aprobado').length, cons=rendiciones.filter(r=>r.estado==='con consulta').length;
  document.getElementById('statsRow').innerHTML=`
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${total}</div><div class="stat-sub">Todos los períodos</div></div>
    <div class="stat-card"><div class="stat-label">Pendientes</div><div class="stat-value">${pend}</div><div class="stat-sub">Por revisar</div></div>
    <div class="stat-card"><div class="stat-label">Aprobadas</div><div class="stat-value" style="color:#555">${apro}</div><div class="stat-sub">Procesadas</div></div>
    <div class="stat-card"><div class="stat-label">Con consulta</div><div class="stat-value" style="color:#888">${cons}</div><div class="stat-sub">Esperando resp.</div></div>
  `;

  const list=document.getElementById('adminList'), empty=document.getElementById('adminEmpty');
  if(!filtradas.length){list.innerHTML='';empty.style.display='';return;}
  empty.style.display='none';

  list.innerHTML=filtradas.slice().reverse().map(r=>{
    const initials=r.titular.split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase();
    const isOpen=expandedId===r.id;
    const tipoBadge=r.tipo==='tarjeta'?'<span class="type-badge type-tarjeta">💳 Tarjeta</span>':'<span class="type-badge type-viaticos">🧳 Viáticos</span>';

    // Build detail content based on type
    let detailContent='';
    if(r.tipo==='tarjeta'){
      detailContent=`
        <div class="detail-grid">
          <div class="detail-item"><div class="d-label">Período</div><div class="d-value">${r.periodo}</div></div>
          <div class="detail-item"><div class="d-label">Adjunto</div><div class="d-value">${adjuntoHTML(r)}</div></div>
          ${r.obs?`<div class="detail-item" style="grid-column:1/-1"><div class="d-label">Observaciones</div><div class="d-value">${r.obs}</div></div>`:''}
        </div>
        <table class="mini-gastos">
          <thead><tr><th>Fecha</th><th>Descripción</th><th>Categoría</th><th>Comprobante</th><th style="text-align:right">Importe</th></tr></thead>
          <tbody>
            ${r.gastos.map(g=>`<tr>
              <td style="font-size:12px;color:var(--gray-600)">${formatDate(g.fecha)}</td>
              <td>${g.desc}${g.obs?`<br><span style="font-size:11px;color:var(--gray-400)">${g.obs}</span>`:''}</td>
              <td style="font-size:12px;color:var(--gray-600)">${g.categoria}</td>
              <td style="font-size:12px">${g.factura==='Sí, a nombre de Granger S.A.'?'✅':g.factura==='Ticket/comprobante'?'🧾':'⚠️'} ${g.factura}</td>
              <td class="td-amount">${g.moneda==='ARS'?'$':'USD '}${fmt(g.importe)}</td>
            </tr>`).join('')}
          </tbody>
        </table>`;
    } else {
      detailContent=`
        <div class="detail-grid">
          <div class="detail-item"><div class="d-label">Área</div><div class="d-value">${r.area}</div></div>
          <div class="detail-item"><div class="d-label">Fechas de viaje</div><div class="d-value">${r.fechasViaje}</div></div>
          <div class="detail-item"><div class="d-label">Motivo</div><div class="d-value">${r.motivo}</div></div>
          <div class="detail-item"><div class="d-label">Adjunto</div><div class="d-value">${adjuntoHTML(r)}</div></div>
          ${r.km>0?`<div class="detail-item"><div class="d-label">Kilometraje</div><div class="d-value">${r.km} km × $${r.valorKm} = <strong>$${fmt(r.kmImporte)}</strong></div></div>`:''}
          ${r.obs?`<div class="detail-item" style="grid-column:1/-1"><div class="d-label">Observaciones</div><div class="d-value">${r.obs}</div></div>`:''}
        </div>
        <table class="mini-gastos">
          <thead><tr><th>Fecha</th><th>Concepto</th><th>Facturado a</th><th>Método</th><th>Comentarios</th><th style="text-align:right">Importe</th></tr></thead>
          <tbody>
            ${r.gastos.map(g=>`<tr>
              <td style="font-size:12px;color:var(--gray-600)">${formatDate(g.fecha)}</td>
              <td><strong>${g.concepto}</strong></td>
              <td style="font-size:12px;color:var(--gray-600)">${g.facturado}</td>
              <td style="font-size:12px">${g.metodo==='REINTEGRO'?'🔄 Reintegro':'💰 Adelanto'}</td>
              <td style="font-size:12px;color:var(--gray-600)">${g.comentarios||'—'} ${g.link?`<a href="${g.link}" target="_blank" style="color:var(--black);text-decoration:underline">🔗</a>`:''}</td>
              <td class="td-amount">$${fmt(g.importe)}</td>
            </tr>`).join('')}
            ${r.km>0?`<tr style="background:var(--gray-50)"><td colspan="5" style="font-size:12px;color:var(--gray-600);font-style:italic">Kilometraje (${r.km} km)</td><td class="td-amount">$${fmt(r.kmImporte)}</td></tr>`:''}
          </tbody>
        </table>`;
    }

    return `
    <div class="rendicion-card">
      <div class="rendicion-card-header ${isOpen?'expanded':''}" onclick="toggleExpand(${r.id})">
        <div class="avatar">${initials}</div>
        <div class="rendicion-info">
          <div class="name">${r.titular}${tipoBadge}</div>
          <div class="meta">${r.tipo==='tarjeta'?r.periodo:r.fechasViaje+' · '+r.motivo} · Enviado ${formatDatetime(r.fechaEnvio)} · ${r.gastos.length} gastos</div>
        </div>
        <div class="rendicion-total">$${fmt(r.totalARS)}${r.totalUSD>0?`<div style="font-size:13px;color:var(--gray-400)">USD ${fmt(r.totalUSD)}</div>`:''}</div>
        ${badgeHTML(r.estado)}
        <span class="expand-icon ${isOpen?'open':''}">▾</span>
      </div>
      <div class="rendicion-body ${isOpen?'open':''}">
        ${detailContent}
        ${r.comentarioAdmin?`
          <div style="background:#FFF8E8;padding:12px 14px;border-radius:6px;margin-bottom:14px">
            <div style="font-size:11px;font-weight:700;color:#7A5000;margin-bottom:4px">Tu consulta enviada</div>
            <div style="font-size:13px;color:#5a3c00">${r.comentarioAdmin}</div>
            ${r.respuestaTitular?`<div style="margin-top:8px;font-size:12px"><strong>Respuesta:</strong> ${r.respuestaTitular}</div>`:'<div style="font-size:12px;color:#9A6800;margin-top:6px">⏳ Esperando respuesta...</div>'}
          </div>`:''}
        <div class="action-bar">
          ${r.estado!=='aprobado'?`<button class="btn btn-approve btn-sm" onclick="aprobar(${r.id})">✓ Aprobar</button>`:'<span style="font-size:13px;font-weight:600;color:#555">✓ Aprobada</span>'}
          ${r.estado!=='aprobado'?`<button class="btn btn-sm btn-ghost" onclick="abrirConsulta(${r.id})">💬 Enviar consulta</button>`:''}
          <span style="flex:1"></span>
          <button class="btn btn-sm" style="background:var(--red-light);color:var(--red);border:1.5px solid var(--red)" onclick="eliminar(${r.id})">🗑 Eliminar</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleExpand(id){expandedId=expandedId===id?null:id;renderAdmin();}
function aprobar(id){reloadRendiciones();const r=rendiciones.find(x=>x.id===id);if(r){r.estado='aprobado';saveRendiciones();renderAdmin();showToast(`Rendición de ${r.titular} aprobada ✓`,'success');}}
function abrirConsulta(id){consultaTargetId=id;document.getElementById('consultaTexto').value='';document.getElementById('modalConsulta').classList.add('open');}
function closeModal(){document.getElementById('modalConsulta').classList.remove('open');consultaTargetId=null;}
function confirmarConsulta(){
  const texto=document.getElementById('consultaTexto').value.trim();
  if(!texto){showToast('Escribí un mensaje','error');return;}
  reloadRendiciones();const r=rendiciones.find(x=>x.id===consultaTargetId);
  if(r){r.comentarioAdmin=texto;r.estado='con consulta';r.respuestaTitular='';saveRendiciones();closeModal();renderAdmin();showToast('Consulta enviada ✓','success');}
}
function eliminar(id){
  if(!confirm('¿Eliminar esta rendición?'))return;
  reloadRendiciones();rendiciones=rendiciones.filter(r=>r.id!==id);saveRendiciones();renderAdmin();
}

renderAdmin();
setInterval(()=>{reloadRendiciones();renderAdmin();},15000);
</script>
</body>
</html>
